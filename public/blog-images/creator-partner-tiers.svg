<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="520" fill="#fafafa" rx="8"/>

  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">The Relationship Tiers</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#666">Different tiers, different purposes, different measurement</text>

  <!-- Headers -->
  <text x="100" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#999" letter-spacing="1">TIER</text>
  <text x="340" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#999" letter-spacing="1">BEST FOR</text>
  <text x="580" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#999" letter-spacing="1">HOW TO MEASURE</text>
  <text x="740" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#999" letter-spacing="1">COST</text>

  <line x1="30" y1="100" x2="770" y2="100" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Row 1: Ambassadors -->
  <rect x="30" y="110" width="140" height="80" rx="6" fill="#1a1a1a"/>
  <text x="100" y="143" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Ambassadors</text>
  <text x="100" y="160" text-anchor="middle" font-size="10" fill="#aaa">Affiliate programme</text>

  <rect x="190" y="110" width="300" height="80" rx="6" fill="#f5f5f5"/>
  <text x="340" y="140" text-anchor="middle" font-size="11" fill="#444">Volume of authentic touchpoints.</text>
  <text x="340" y="157" text-anchor="middle" font-size="11" fill="#444">Ambient awareness and trust.</text>
  <text x="340" y="174" text-anchor="middle" font-size="11" fill="#444">Scalable organic word-of-mouth.</text>

  <rect x="510" y="110" width="140" height="80" rx="6" fill="#f5f5f5"/>
  <text x="580" y="145" text-anchor="middle" font-size="11" fill="#444">Affiliate codes,</text>
  <text x="580" y="162" text-anchor="middle" font-size="11" fill="#444">HDYHAU, blended</text>
  <text x="580" y="179" text-anchor="middle" font-size="11" fill="#444">CAC trend</text>

  <rect x="670" y="110" width="100" height="80" rx="6" fill="#f5f5f5"/>
  <text x="720" y="155" text-anchor="middle" font-size="12" font-weight="500" fill="#444">$</text>

  <!-- Row 2: UGC Creators -->
  <rect x="30" y="205" width="140" height="80" rx="6" fill="#333"/>
  <text x="100" y="238" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">UGC Creators</text>
  <text x="100" y="255" text-anchor="middle" font-size="10" fill="#aaa">Paid content</text>

  <rect x="190" y="205" width="300" height="80" rx="6" fill="#f5f5f5"/>
  <text x="340" y="235" text-anchor="middle" font-size="11" fill="#444">Content pipeline at low cost.</text>
  <text x="340" y="252" text-anchor="middle" font-size="11" fill="#444">Educational and brand content.</text>
  <text x="340" y="269" text-anchor="middle" font-size="11" fill="#444">Best bang for buck on conversions.</text>

  <rect x="510" y="205" width="140" height="80" rx="6" fill="#f5f5f5"/>
  <text x="580" y="240" text-anchor="middle" font-size="11" fill="#444">CPA, content</text>
  <text x="580" y="257" text-anchor="middle" font-size="11" fill="#444">performance,</text>
  <text x="580" y="274" text-anchor="middle" font-size="11" fill="#444">cost per piece</text>

  <rect x="670" y="205" width="100" height="80" rx="6" fill="#f5f5f5"/>
  <text x="720" y="250" text-anchor="middle" font-size="12" font-weight="500" fill="#444">$$</text>

  <!-- Row 3: Formal Partners -->
  <rect x="30" y="300" width="140" height="80" rx="6" fill="#555"/>
  <text x="100" y="330" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Formal</text>
  <text x="100" y="347" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Partners</text>
  <text x="100" y="364" text-anchor="middle" font-size="10" fill="#bbb">Structured collab</text>

  <rect x="190" y="300" width="300" height="80" rx="6" fill="#f5f5f5"/>
  <text x="340" y="330" text-anchor="middle" font-size="11" fill="#444">Brand perception shift.</text>
  <text x="340" y="347" text-anchor="middle" font-size="11" fill="#444">Aspirational association.</text>
  <text x="340" y="364" text-anchor="middle" font-size="11" fill="#444">"If they use it, it must be good."</text>

  <rect x="510" y="300" width="140" height="80" rx="6" fill="#f5f5f5"/>
  <text x="580" y="335" text-anchor="middle" font-size="11" fill="#444">Brand sentiment,</text>
  <text x="580" y="352" text-anchor="middle" font-size="11" fill="#444">inbound interest,</text>
  <text x="580" y="369" text-anchor="middle" font-size="11" fill="#444">qualitative signals</text>

  <rect x="670" y="300" width="100" height="80" rx="6" fill="#f5f5f5"/>
  <text x="720" y="345" text-anchor="middle" font-size="12" font-weight="500" fill="#444">$$$</text>

  <!-- Row 4: Brand Partnerships -->
  <rect x="30" y="395" width="140" height="80" rx="6" fill="#777"/>
  <text x="100" y="428" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Brand</text>
  <text x="100" y="445" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Partnerships</text>
  <text x="100" y="462" text-anchor="middle" font-size="10" fill="#ddd">Rev share / co-promo</text>

  <rect x="190" y="395" width="300" height="80" rx="6" fill="#f5f5f5"/>
  <text x="340" y="425" text-anchor="middle" font-size="11" fill="#444">Expanded distribution.</text>
  <text x="340" y="442" text-anchor="middle" font-size="11" fill="#444">Access to new audiences.</text>
  <text x="340" y="459" text-anchor="middle" font-size="11" fill="#444">Credibility by association.</text>

  <rect x="510" y="395" width="140" height="80" rx="6" fill="#f5f5f5"/>
  <text x="580" y="430" text-anchor="middle" font-size="11" fill="#444">Awareness lift,</text>
  <text x="580" y="447" text-anchor="middle" font-size="11" fill="#444">referral traffic,</text>
  <text x="580" y="464" text-anchor="middle" font-size="11" fill="#444">case by case</text>

  <rect x="670" y="395" width="100" height="80" rx="6" fill="#f5f5f5"/>
  <text x="720" y="440" text-anchor="middle" font-size="12" font-weight="500" fill="#444">Varies</text>

  <!-- Footer -->
  <text x="400" y="505" text-anchor="middle" font-size="11" fill="#888" font-style="italic">Each tier reinforces the others. Measure them separately, invest in them together.</text>
</svg>
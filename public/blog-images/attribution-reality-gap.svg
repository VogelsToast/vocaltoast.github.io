<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="520" fill="#fafafa" rx="8"/>

  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">What Actually Happened vs What Your Dashboard Shows</text>

  <!-- LEFT: What actually happened -->
  <text x="220" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">The real customer journey</text>

  <!-- Step boxes -->
  <rect x="70" y="90" width="300" height="40" rx="6" fill="#1a1a1a"/>
  <text x="220" y="115" text-anchor="middle" font-size="11" fill="#fff">Sees creator use your product on YouTube</text>

  <line x1="220" y1="130" x2="220" y2="148" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="215,146 225,146 220,154" fill="#ccc"/>

  <rect x="70" y="156" width="300" height="40" rx="6" fill="#1a1a1a"/>
  <text x="220" y="181" text-anchor="middle" font-size="11" fill="#fff">Asks community group "anyone tried this?"</text>

  <line x1="220" y1="196" x2="220" y2="214" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="215,212 225,212 220,220" fill="#ccc"/>

  <rect x="70" y="222" width="300" height="40" rx="6" fill="#1a1a1a"/>
  <text x="220" y="247" text-anchor="middle" font-size="11" fill="#fff">Gets positive replies from other users</text>

  <line x1="220" y1="262" x2="220" y2="280" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="215,278 225,278 220,286" fill="#ccc"/>

  <rect x="70" y="288" width="300" height="40" rx="6" fill="#333"/>
  <text x="220" y="313" text-anchor="middle" font-size="11" fill="#fff">Visits your website, reads a few pages</text>

  <line x1="220" y1="328" x2="220" y2="346" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="215,344 225,344 220,352" fill="#ccc"/>

  <rect x="70" y="354" width="300" height="40" rx="6" fill="#333"/>
  <text x="220" y="373" text-anchor="middle" font-size="11" fill="#fff">Comes back a week later, Googles your name</text>
  <text x="220" y="387" text-anchor="middle" font-size="10" fill="#aaa">(no affiliate code, no UTM)</text>

  <line x1="220" y1="394" x2="220" y2="412" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="215,410 225,410 220,418" fill="#ccc"/>

  <rect x="70" y="420" width="300" height="40" rx="6" fill="#555"/>
  <text x="220" y="445" text-anchor="middle" font-size="11" fill="#fff">Signs up for free trial</text>

  <!-- RIGHT: What dashboard shows -->
  <text x="600" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#888">What your analytics says</text>

  <!-- Big empty space to show how little is captured -->
  <rect x="470" y="90" width="260" height="196" rx="6" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <text x="600" y="185" text-anchor="middle" font-size="14" fill="#ccc">Not tracked</text>
  <text x="600" y="205" text-anchor="middle" font-size="11" fill="#ddd">Invisible to analytics</text>

  <!-- Arrow down -->
  <line x1="600" y1="286" x2="600" y2="340" stroke="#e0e0e0" stroke-width="1.5"/>
  <polygon points="595,338 605,338 600,346" fill="#e0e0e0"/>

  <!-- What analytics actually captures -->
  <rect x="470" y="354" width="260" height="40" rx="6" fill="#e0e0e0"/>
  <text x="600" y="376" text-anchor="middle" font-size="11" fill="#666">Source: Organic Search</text>

  <line x1="600" y1="394" x2="600" y2="412" stroke="#e0e0e0" stroke-width="1.5"/>
  <polygon points="595,410 605,410 600,418" fill="#e0e0e0"/>

  <rect x="470" y="420" width="260" height="40" rx="6" fill="#e0e0e0"/>
  <text x="600" y="445" text-anchor="middle" font-size="11" fill="#666">Conversion attributed to: Google</text>

  <!-- Summary bar -->
  <rect x="470" y="475" width="260" height="30" rx="4" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="600" y="495" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a1a">Creator did 80% of the work. Got 0% credit.</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="450" fill="#fafafa" rx="8"/>

  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">Campaign Thinking vs Ecosystem Thinking</text>

  <!-- Left side: Campaign -->
  <text x="200" y="75" text-anchor="middle" font-size="14" font-weight="600" fill="#888">Campaign-based</text>

  <!-- Campaign timeline bars -->
  <rect x="60" y="100" width="120" height="24" rx="4" fill="#ccc"/>
  <text x="120" y="116" text-anchor="middle" font-size="10" fill="#fff" font-weight="500">Campaign 1</text>

  <rect x="200" y="100" width="80" height="24" rx="4" fill="#ccc"/>
  <text x="240" y="116" text-anchor="middle" font-size="10" fill="#fff" font-weight="500">Campaign 2</text>

  <rect x="300" y="100" width="60" height="24" rx="4" fill="#ccc"/>
  <text x="330" y="116" text-anchor="middle" font-size="10" fill="#fff" font-weight="500">C3</text>

  <!-- Campaign impact: spikes that reset -->
  <polyline points="60,250 90,200 120,180 150,240 180,250 200,250 220,210 250,220 280,250 300,250 315,220 335,230 360,250" fill="none" stroke="#aaa" stroke-width="2"/>

  <!-- Labels -->
  <text x="60" y="275" font-size="10" fill="#999">Start</text>
  <text x="340" y="275" font-size="10" fill="#999">End</text>
  <text x="200" y="295" text-anchor="middle" font-size="11" fill="#888">Each campaign resets to zero</text>

  <!-- Divider -->
  <line x1="400" y1="70" x2="400" y2="420" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Right side: Ecosystem -->
  <text x="600" y="75" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Ecosystem-based</text>

  <!-- Ecosystem continuous bar -->
  <rect x="440" y="100" width="320" height="24" rx="4" fill="#1a1a1a"/>
  <text x="600" y="116" text-anchor="middle" font-size="10" fill="#fff" font-weight="500">Ongoing ecosystem investment</text>

  <!-- Ecosystem impact: compounding curve -->
  <polyline points="440,250 470,245 500,238 530,228 560,216 590,200 620,182 650,160 680,136 710,110 740,82 760,68" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Small event markers on the curve -->
  <circle cx="500" cy="238" r="4" fill="#1a1a1a"/>
  <circle cx="560" cy="216" r="4" fill="#1a1a1a"/>
  <circle cx="620" cy="182" r="4" fill="#1a1a1a"/>
  <circle cx="680" cy="136" r="4" fill="#1a1a1a"/>
  <circle cx="740" cy="82" r="4" fill="#1a1a1a"/>

  <!-- Event labels -->
  <text x="500" y="258" text-anchor="middle" font-size="9" fill="#666">Event</text>
  <text x="560" y="236" text-anchor="middle" font-size="9" fill="#666">Creator</text>
  <text x="620" y="202" text-anchor="middle" font-size="9" fill="#666">Community</text>
  <text x="680" y="156" text-anchor="middle" font-size="9" fill="#666">Partner</text>
  <text x="740" y="102" text-anchor="middle" font-size="9" fill="#666">Referral</text>

  <text x="600" y="295" text-anchor="middle" font-size="11" fill="#1a1a1a">Each investment compounds on the last</text>

  <!-- Bottom axis labels -->
  <line x1="60" y1="250" x2="360" y2="250" stroke="#ddd" stroke-width="1"/>
  <line x1="440" y1="250" x2="760" y2="250" stroke="#ddd" stroke-width="1"/>

  <!-- Bottom summary -->
  <rect x="40" y="340" width="330" height="80" rx="6" fill="#f0f0f0"/>
  <text x="205" y="365" text-anchor="middle" font-size="12" font-weight="500" fill="#888">Result: Linear returns</text>
  <text x="205" y="385" text-anchor="middle" font-size="11" fill="#999">You stop spending, growth stops.</text>
  <text x="205" y="402" text-anchor="middle" font-size="11" fill="#999">CAC stays flat or increases.</text>

  <rect x="430" y="340" width="330" height="80" rx="6" fill="#1a1a1a"/>
  <text x="595" y="365" text-anchor="middle" font-size="12" font-weight="500" fill="#fff">Result: Compounding returns</text>
  <text x="595" y="385" text-anchor="middle" font-size="11" fill="#ccc">Trust builds. Word of mouth grows.</text>
  <text x="595" y="402" text-anchor="middle" font-size="11" fill="#ccc">CAC decreases over time.</text>
</svg>
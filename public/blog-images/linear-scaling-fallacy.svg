<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="440" fill="#fafafa" rx="8"/>

  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">Why "Just Spend 10X" Doesn't Work</text>

  <!-- LEFT: The spreadsheet logic -->
  <text x="200" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">The spreadsheet logic</text>

  <rect x="50" y="90" width="300" height="44" rx="6" fill="#1a1a1a"/>
  <text x="200" y="108" text-anchor="middle" font-size="11" fill="#fff">10 partners x $3,000/month = $30K spend</text>
  <text x="200" y="124" text-anchor="middle" font-size="11" fill="#aaa">Generated 50 conversions</text>

  <line x1="200" y1="134" x2="200" y2="156" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="195,154 205,154 200,162" fill="#ccc"/>

  <rect x="50" y="164" width="300" height="44" rx="6" fill="#555"/>
  <text x="200" y="182" text-anchor="middle" font-size="11" fill="#fff">So: 10 partners x $30,000/month = $300K</text>
  <text x="200" y="198" text-anchor="middle" font-size="11" fill="#aaa">"Should generate 500 conversions"</text>

  <line x1="200" y1="208" x2="200" y2="230" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="195,228 205,228 200,236" fill="#ccc"/>

  <rect x="50" y="238" width="300" height="34" rx="6" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="200" y="260" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">Expect 7-month CAC payback</text>

  <!-- RIGHT: What actually happens -->
  <text x="600" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">What actually happens</text>

  <rect x="450" y="90" width="300" height="36" rx="6" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="600" y="113" text-anchor="middle" font-size="11" fill="#666">Audience overlap between 10 big creators</text>

  <rect x="450" y="138" width="300" height="36" rx="6" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="600" y="161" text-anchor="middle" font-size="11" fill="#666">Same content format every month = fatigue</text>

  <rect x="450" y="186" width="300" height="36" rx="6" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="600" y="209" text-anchor="middle" font-size="11" fill="#666">No diversification across audience sizes</text>

  <rect x="450" y="234" width="300" height="36" rx="6" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="600" y="257" text-anchor="middle" font-size="11" fill="#666">Concentrated risk: 2 underperformers = crisis</text>

  <!-- Bottom comparison -->
  <line x1="50" y1="310" x2="750" y2="310" stroke="#e0e0e0" stroke-width="1"/>

  <text x="200" y="340" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">Concentrated approach</text>
  <text x="200" y="360" text-anchor="middle" font-size="11" fill="#888">10 big partners, $300K budget</text>
  <text x="200" y="380" text-anchor="middle" font-size="11" fill="#888">Same playbook on repeat</text>
  <rect x="100" y="392" width="200" height="30" rx="4" fill="#fff" stroke="#aaa" stroke-width="1"/>
  <text x="200" y="412" text-anchor="middle" font-size="11" fill="#888">Fragile, hard to learn from</text>

  <text x="600" y="340" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">Diversified approach</text>
  <text x="600" y="360" text-anchor="middle" font-size="11" fill="#888">30+ creators across tiers, $300K budget</text>
  <text x="600" y="380" text-anchor="middle" font-size="11" fill="#888">Test, learn, double down on winners</text>
  <rect x="500" y="392" width="200" height="30" rx="4" fill="#1a1a1a"/>
  <text x="600" y="412" text-anchor="middle" font-size="11" fill="#fff">Resilient, data-rich</text>
</svg>
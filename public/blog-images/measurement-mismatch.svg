<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="420" fill="#fafafa" rx="8"/>

  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">The Measurement Mismatch</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#888">What creators are deployed for vs what companies want to prove</text>

  <!-- LEFT: What creators are used for -->
  <text x="200" y="90" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">What creators are used for</text>

  <!-- Brand Awareness bar -->
  <text x="60" y="125" font-size="11" fill="#666">Brand awareness</text>
  <rect x="60" y="132" width="280" height="28" rx="4" fill="#1a1a1a"/>
  <text x="350" y="151" font-size="12" font-weight="600" fill="#1a1a1a">82%</text>

  <!-- Community engagement bar -->
  <text x="60" y="180" font-size="11" fill="#666">Community engagement</text>
  <rect x="60" y="187" width="160" height="28" rx="4" fill="#555"/>
  <text x="230" y="206" font-size="12" font-weight="600" fill="#1a1a1a">47%</text>

  <!-- Trust and credibility bar -->
  <text x="60" y="235" font-size="11" fill="#666">Trust and credibility</text>
  <rect x="60" y="242" width="157" height="28" rx="4" fill="#555"/>
  <text x="227" y="261" font-size="12" font-weight="600" fill="#1a1a1a">46%</text>

  <!-- Direct sales bar -->
  <text x="60" y="290" font-size="11" fill="#666">Direct sales</text>
  <rect x="60" y="297" width="99" height="28" rx="4" fill="#aaa"/>
  <text x="169" y="316" font-size="12" font-weight="600" fill="#1a1a1a">29%</text>

  <!-- RIGHT: What companies measure -->
  <text x="610" y="90" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">But what gets measured</text>

  <rect x="470" y="120" width="280" height="70" rx="6" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="610" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">Affiliate clicks</text>
  <text x="610" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">Promo code redemptions</text>
  <text x="610" y="180" text-anchor="middle" font-size="10" fill="#888">conversion metrics</text>

  <!-- Arrow pointing to gap -->
  <line x1="610" y1="195" x2="610" y2="230" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="605,228 615,228 610,236" fill="#ccc"/>

  <rect x="470" y="240" width="280" height="80" rx="6" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="610" y="268" text-anchor="middle" font-size="12" fill="#999">Brand search lift?</text>
  <text x="610" y="286" text-anchor="middle" font-size="12" fill="#999">Community advocacy?</text>
  <text x="610" y="304" text-anchor="middle" font-size="12" fill="#999">Trust transfer?</text>

  <!-- Bottom callout -->
  <rect x="150" y="360" width="500" height="40" rx="6" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="400" y="385" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">42% of marketers say measurement is their single biggest barrier</text>
</svg>
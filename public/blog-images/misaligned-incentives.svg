<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="420" fill="#fafafa" rx="8"/>

  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">When Creator Incentives and Business Goals Diverge</text>

  <!-- Left side: Business goal -->
  <text x="200" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">What the business wanted</text>

  <rect x="50" y="90" width="300" height="50" rx="6" fill="#1a1a1a"/>
  <text x="200" y="112" text-anchor="middle" font-size="12" fill="#fff">Drive revenue during the sale</text>
  <text x="200" y="128" text-anchor="middle" font-size="10" fill="#aaa">Promote discounts → paid conversions</text>

  <line x1="200" y1="140" x2="200" y2="165" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="195,163 205,163 200,170" fill="#ccc"/>

  <rect x="50" y="172" width="300" height="40" rx="6" fill="#333"/>
  <text x="200" y="196" text-anchor="middle" font-size="11" fill="#fff">Messaging needed: "Big sale, X% off"</text>

  <!-- Right side: Creator incentive -->
  <text x="600" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">What creators were incentivised to do</text>

  <rect x="450" y="90" width="300" height="50" rx="6" fill="#1a1a1a"/>
  <text x="600" y="112" text-anchor="middle" font-size="12" fill="#fff">Get the most signups to win</text>
  <text x="600" y="128" text-anchor="middle" font-size="10" fill="#aaa">Competition: most signups = 3x commission</text>

  <line x1="600" y1="140" x2="600" y2="165" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="595,163 605,163 600,170" fill="#ccc"/>

  <rect x="450" y="172" width="300" height="40" rx="6" fill="#333"/>
  <text x="600" y="196" text-anchor="middle" font-size="11" fill="#fff">Messaging used: "Sign up for free"</text>

  <!-- Collision zone -->
  <rect x="100" y="240" width="600" height="70" rx="6" fill="#fff" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="400" y="265" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Result: friction</text>
  <text x="400" y="285" text-anchor="middle" font-size="11" fill="#666">Creators optimised for signups (what was measured), not sale messaging (what the business needed).</text>
  <text x="400" y="300" text-anchor="middle" font-size="11" fill="#666">Sale underperformed. Creators felt pulled in two directions.</text>

  <!-- Fix -->
  <line x1="400" y1="310" x2="400" y2="335" stroke="#1a1a1a" stroke-width="1.5"/>
  <polygon points="395,333 405,333 400,340" fill="#1a1a1a"/>

  <rect x="100" y="342" width="600" height="55" rx="6" fill="#1a1a1a"/>
  <text x="400" y="364" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">The fix: align incentive structure to the business objective</text>
  <text x="400" y="383" text-anchor="middle" font-size="11" fill="#aaa">Reward paid conversions during sale, or run signup competition before the sale window.</text>
</svg>